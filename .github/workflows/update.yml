name: Update NAV data

on:
  workflow_dispatch:

concurrency:
  group: update-nav-data
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run build_data.py
        run: python build_data.py

      - name: Run build_history.py
        run: python build_history.py

      - name: Commit and push if market data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # generated_at は毎回必ず変化するため除外して判定。
          # それ以外の差分（株価・NAV・為替）がある場合のみコミットする。
          if git diff --staged -- data.json | grep -v '"generated_at"' | grep -qE '^\+[^+]|^-[^-]'; then
            git commit -m "Auto-update: data.json $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin master
            git push
          else
            echo "市場データに変更なし（generated_at のみ）。スキップ。"
          fi
