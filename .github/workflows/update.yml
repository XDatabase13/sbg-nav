name: Update NAV data

on:
  schedule:
    # JST 05:30 / 06:00 / 06:30 / 07:00 / 07:30 = UTC 20:30 / 21:00 / 21:30 / 22:00 / 22:30
    - cron: '30 20 * * *'
    - cron: '0 21 * * *'
    - cron: '30 21 * * *'
    - cron: '0 22 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch: # 手動実行も可

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run build_data.py
        run: python build_data.py

      - name: Commit and push if market data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # generated_at は毎回必ず変化するため除外して判定。
          # それ以外の差分（株価・NAV・為替）がある場合のみコミットする。
          if git diff --staged -- data.json | grep -v '"generated_at"' | grep -qE '^\+[^+]|^-[^-]'; then
            git commit -m "Auto-update: data.json $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "市場データに変更なし（generated_at のみ）。スキップ。"
          fi
